<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubLifter - Package Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; color: white; border-radius: 15px; }
        .form-control, .form-select { background: #0d1117; border: 1px solid #30363d; color: white; }
        .form-control:focus, .form-select:focus { background: #0d1117; color: white; border-color: #a855f7; box-shadow: 0 0 10px rgba(168,85,247,0.4); }
        .form-control::placeholder { color: #555; }
        .btn-primary { background: linear-gradient(45deg, #a855f7, #6d28d9); border: none; font-weight: bold; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168,85,247,0.4); }
        .btn-outline-danger { border-color: #dc3545; color: #dc3545; }
        .btn-outline-danger:hover { background: #dc3545; color: white; }
        .btn-outline-warning { border-color: #ffc107; color: #ffc107; }
        .btn-outline-warning:hover { background: #ffc107; color: #000; }
        .text-primary { color: #a855f7 !important; }
        .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid #22c55e; border-radius: 20px; padding: 3px 12px; font-size: 0.75rem; }
        .badge-inactive { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid #ef4444; border-radius: 20px; padding: 3px 12px; font-size: 0.75rem; }
        .package-row { transition: background 0.2s; }
        .package-row:hover { background: rgba(168,85,247,0.05); }
        .modal-content { background: #161b22; border: 1px solid #30363d; color: white; }
        .modal-header { border-bottom: 1px solid #30363d; }
        .modal-footer { border-top: 1px solid #30363d; }
        .table { color: white; }
        .table thead th { color: #8b949e; font-weight: 500; border-color: #30363d; }
        .table td { border-color: #21262d; vertical-align: middle; }
        #toast { position: fixed; bottom: 30px; right: 30px; z-index: 9999; min-width: 250px; }
    </style>
</head>
<body class="py-5">

<div class="container" style="max-width: 900px;">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="text-primary fw-bold mb-0">ClubLifter</h4>
            <small class="text-secondary">Package Management</small>
        </div>
        <a href="/" class="btn btn-sm btn-outline-secondary">← Back to Dashboard</a>
    </div>

    <!-- Add New Package -->
    <div class="card p-4 mb-4">
        <h6 class="text-secondary mb-3">Add New Package</h6>
        <div class="row g-2">
            <div class="col-md-4">
                <input type="text" id="newName" class="form-control" placeholder="Package name">
            </div>
            <div class="col-md-4">
                <input type="text" id="newDesc" class="form-control" placeholder="Description">
            </div>
            <div class="col-md-2">
                <input type="number" id="newPrice" class="form-control" placeholder="Price ($)" min="0">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addPackage()">+ Add</button>
            </div>
        </div>
    </div>

    <!-- Packages Table -->
    <div class="card p-4">
        <h6 class="text-secondary mb-3">Existing Packages</h6>
        <table class="table table-dark table-sm">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody id="packagesTable">
                {% for p in packages %}
                <tr class="package-row" id="row-{{ p.id }}">
                    <td class="fw-bold">{{ p.name }}</td>
                    <td class="text-secondary">{{ p.description }}</td>
                    <td class="text-primary">${{ "%.2f"|format(p.price) }}</td>
                    <td><span class="{{ 'badge-active' if p.active else 'badge-inactive' }}">{{ 'Active' if p.active else 'Inactive' }}</span></td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-warning me-1" onclick="openEdit({{ p.id }}, '{{ p.name }}', '{{ p.description }}', {{ p.price }}, {{ p.active|lower }})">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deletePackage({{ p.id }})">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-primary">Edit Package</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="small text-secondary">Name</label>
                    <input type="text" id="editName" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="small text-secondary">Description</label>
                    <input type="text" id="editDesc" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="small text-secondary">Price ($)</label>
                    <input type="number" id="editPrice" class="form-control" min="0">
                </div>
                <div class="mb-3">
                    <label class="small text-secondary">Status</label>
                    <select id="editActive" class="form-control form-select">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast align-items-center text-white border-0" role="alert" style="display:none;">
    <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    function showToast(msg, success = true) {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        t.style.background = success ? '#22c55e' : '#ef4444';
        document.getElementById('toastMsg').innerText = msg;
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function addPackage() {
        const name  = document.getElementById('newName').value.trim();
        const desc  = document.getElementById('newDesc').value.trim();
        const price = document.getElementById('newPrice').value || 0;
        if (!name) return showToast('Name is required', false);

        const fd = new FormData();
        fd.append('name', name);
        fd.append('description', desc);
        fd.append('price', price);

        const res  = await fetch('/admin/packages/new', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
            showToast('Package added!');
            location.reload();
        } else {
            showToast(data.error, false);
        }
    }

    function openEdit(id, name, desc, price, active) {
        document.getElementById('editId').value    = id;
        document.getElementById('editName').value  = name;
        document.getElementById('editDesc').value  = desc;
        document.getElementById('editPrice').value = price;
        document.getElementById('editActive').value = active.toString();
        editModal.show();
    }

    async function saveEdit() {
        const id    = document.getElementById('editId').value;
        const fd    = new FormData();
        fd.append('name',        document.getElementById('editName').value);
        fd.append('description', document.getElementById('editDesc').value);
        fd.append('price',       document.getElementById('editPrice').value);
        fd.append('active',      document.getElementById('editActive').value);

        const res  = await fetch(`/admin/packages/edit/${id}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
            showToast('Package updated!');
            editModal.hide();
            location.reload();
        } else {
            showToast(data.error, false);
        }
    }

    async function deletePackage(id) {
        if (!confirm('Are you sure you want to delete this package?')) return;
        const res  = await fetch(`/admin/packages/delete/${id}`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
            showToast('Package deleted!');
            document.getElementById(`row-${id}`).remove();
        } else {
            showToast(data.error, false);
        }
    }
</script>
</body>
</html>
