<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ClubLifter Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1a002f, #0d1117);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            display: flex;
            width: 900px;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
        }

        /* LADO DA IMAGEM */
        .left {
            width: 50%;
            background: url('/static/img/foto.jpeg') center/cover no-repeat;
            position: relative;
        }

        .left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
        }

        /* LADO DO LOGIN */
        .right {
            width: 50%;
            background: rgba(252, 252, 252, 0.9);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            color: #fff;
            margin-bottom: 10px;
        }

        p {
            color: #8b949e;
            margin-bottom: 30px;
        }

        .form-control {
            background: transparent;
            border: 1px solid #30363d;
            color: white;
            margin-bottom: 15px;
        }

        .form-control:focus {
            background: transparent;
            color: white;
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168,85,247,0.5);
        }

        .btn-login {
            background: linear-gradient(45deg, #a855f7, #6d28d9);
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(168,85,247,0.7);
        }

        .logo-mini {
            width: 120px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .error {
            margin-top: 10px;
        }

        /* RESPONSIVO */
        @media(max-width: 768px){
            .login-container {
                flex-direction: column;
                width: 90%;
                height: auto;
            }

            .left {
                height: 200px;
                width: 100%;
            }

            .right {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="login-container">

    <!-- IMAGEM -->
    <div class="left"></div>

    <!-- FORM -->
    <div class="right">
        
       

        <h2>Bem-vindo</h2>
        <p>Entre na plataforma ClubLifter</p>

        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Usuário" required>
            <input type="password" name="password" class="form-control" placeholder="Senha" required>

            <button class="btn btn-login w-100 mt-3">Entrar</button>
        </form>

        {% if error %}
            <div class="alert alert-danger error">{{ error }}</div>
        {% endif %}

    </div>

</div>

</body>
</html>
