<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClubLifter Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1a002f, #0d1117);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            display: flex;
            width: 900px;
            height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
        }

        /* IMAGE SIDE */
        .left {
            width: 50%;
            background: url('/static/img/foto.jpeg') center/cover no-repeat;
            position: relative;
        }

        .left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
        }

        /* LOGIN SIDE */
        .right {
            width: 50%;
            background: #161b22; /* Updated to match the dark theme */
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            color: #fff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            color: #8b949e;
            margin-bottom: 30px;
        }

        .form-control {
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            margin-bottom: 15px;
        }

        .form-control:focus {
            background: #0d1117;
            color: white;
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168,85,247,0.5);
        }

        .btn-login {
            background: linear-gradient(45deg, #a855f7, #6d28d9);
            border: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(168,85,247,0.7);
            color: white;
        }

        .error {
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* RESPONSIVE */
        @media(max-width: 768px){
            .login-container {
                flex-direction: column;
                width: 90%;
                height: auto;
            }

            .left {
                height: 200px;
                width: 100%;
            }

            .right {
                width: 100%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="left"></div>

    <div class="right">
        
        <h2>Welcome</h2>
        <p>Sign in to the ClubLifter platform</p>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-login w-100 mt-2 py-2">Login</button>
        </form>

        {% if error %}
            <div class="alert alert-danger error py-2 text-center">{{ error }}</div>
        {% endif %}

    </div>

</div>

</body>
</html>
