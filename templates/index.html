<!DOCTYPE html>
<html>
<head>
    <title>DevVerse GPS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container">
    <div class="card p-4 mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-4">📍 ClubLifter</h3>

        <form id="markerForm">
            <input type="text" name="nome" class="form-control mb-3" placeholder="Nome" required>
            <input type="text" name="cep" class="form-control mb-3" placeholder="CEP" required>
            <input type="text" name="numero" class="form-control mb-3" placeholder="Número">

            <button class="btn btn-success w-100">Cadastrar</button>
        </form>

        <div id="status" class="mt-3"></div>
    </div>
</div>

<script src="/static/js/script.js"></script>
</body>
</html>
